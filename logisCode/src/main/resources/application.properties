spring.application.name=logisCode

#Configuracion Security
spring.security.user.name=${SS_USER}
spring.security.user.password=${SS_PASSWORD}

#Configuracion de BD
spring.jpa.hibernate.ddl-auto=UPDATE
spring.datasource.url=${BD_URL}
spring.datasource.username=${BD_USERNAME}
spring.datasource.password=${BD_PASSWORD}

#Configuracion de OAUTH con GITHUB
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.cleint.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

#Configuracion de OAUTH con Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.ouath2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
